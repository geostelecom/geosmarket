name: Sincronizacion Automatica Geosmarket

on:
  schedule:
    - cron: '0 * * * *' # Ejecutar cada hora
  workflow_dispatch: # Permitir ejecución manual

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.G_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests python-dotenv

      - name: Sincronizar Imagenes desde Google Drive
        run: python sync_gdrive.py
        env:
          GDRIVE_IMAGES_FOLDER: ${{ secrets.GDRIVE_IMAGES_FOLDER }}

      - name: Transformar Excel a JSON
        run: python transform_content.py
        env:
          CONTENT_SHEET_URL: ${{ secrets.CONTENT_SHEET_URL }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
          GIT_REPO: ${{ secrets.GIT_REPO }}
          CONTACT_FORM_URL: ${{ secrets.CONTACT_FORM_URL }}

      - name: Commit y Push de cambios
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/news.json data/config.json imagenes/
          # Solo hacer commit si hay cambios. Se usa --force para evitar errores de sincronización.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualizacion automatica" && git push origin main --force)
        env:
          GITHUB_TOKEN: ${{ secrets.G_TOKEN }}


