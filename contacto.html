<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | La Bodeguita de Yola</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            color: #212529;
        }
        .navbar {
            background-color: white;
            border-bottom: 1px solid #e9ecef;
        }
        .contacto-container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="index.html">La Bodeguita de Yola</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="index.html" class="btn btn-sm btn-outline-primary rounded-pill me-3">
                    <i class="fas fa-arrow-left me-1"></i> Volver al Inicio
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="contacto-container">
            <h2 class="mb-4">Contacto</h2>
            <p class="text-muted mb-4">Por favor completá los siguientes datos para coordinar tu entrega.</p>
            
            <form action="https://docs.google.com/forms/d/e/1FAIpQLSd7t7YZA74QKjv8IMo972AEcls4hQuja-gNgrjE14nnKzmajg/formResponse" method="POST" target="hidden_iframe" onsubmit="return googleFormSubmit(event)">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre</label>
                        <input required type="text" name="entry.1128137121" class="form-control" placeholder="Tu nombre">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Correo</label>
                        <input required type="email" name="entry.2094488878" class="form-control" placeholder="tucorreo@dominio.com">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Dirección de entrega para pedidos</label>
                    <p class="small text-muted mb-2">Agregar código postal <a href="https://correos.go.cr/codigo-postal/" target="_blank">https://correos.go.cr/codigo-postal/</a>, provincia, cantón, distrito, otras señas.</p>
                    <textarea name="entry.1165691896" class="form-control" rows="2" placeholder="Ej: 40103, Heredia, Santa Bárbara, San Juan, 50 m este..."></textarea>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Número teléfono de contacto de quien recibe</label>
                        <input type="text" name="entry.1195168312" class="form-control" placeholder="+506...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Nombre de contacto de quien recibe para coordinar</label>
                        <input type="text" name="entry.386346768" class="form-control" placeholder="Nombre completo">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label d-block fw-semibold">Acepto recibir notificaciones de nuevos productos por correo electrónico</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="entry.1322008400" id="email_yes" value="Acepto" checked>
                        <label class="form-check-label" for="email_yes">Acepto</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="entry.1322008400" id="email_no" value="No Acepto">
                        <label class="form-check-label" for="email_no">No Acepto</label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label d-block fw-semibold">Acepto ser contactado por medio telefónico para coordinar entregas</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="entry.1320409013" id="phone_yes" value="Acepto" checked>
                        <label class="form-check-label" for="phone_yes">Acepto</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="entry.1320409013" id="phone_no" value="No Acepto">
                        <label class="form-check-label" for="phone_no">No Acepto</label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label d-block fw-semibold">Acepto recibir notificaciones de nuevos productos por Whatsapp</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="entry.540142033" id="whatsapp_yes" value="Acepto" checked>
                        <label class="form-check-label" for="whatsapp_yes">Acepto</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="entry.540142033" id="whatsapp_no" value="No Acepto">
                        <label class="form-check-label" for="whatsapp_no">No Acepto</label>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mensaje</label>
                    <textarea required id="mensajeAreaVisible" class="form-control" rows="4" placeholder="Contanos qué necesitás..."></textarea>
                    <input type="hidden" name="entry.1249592938" id="mensajeAreaOculto">
                </div>
                <div class="d-flex align-items-center mt-4">
                    <button type="submit" id="submitBtn" class="btn btn-primary rounded-pill px-4">Enviar</button>
                    <span id="formMsg" class="ms-3 text-muted"></span>
                </div>
                <input type="hidden" id="origen_pagina" name="origen_pagina" value="contacto">
                <input type="hidden" id="origen_elemento" name="origen_elemento" value="formulario_contacto">
            </form>
            <iframe name="hidden_iframe" style="display:none;"></iframe>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Guardamos la ruta y categoria en variables globales para usarla en el submit
        let rutaTrazabilidad = "";
        let categoriaOrigen = "";
        
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const mensaje = params.get('mensaje');
            const cat = params.get('cat');
            if (mensaje) {
                rutaTrazabilidad = mensaje;
            }
            if (cat) {
                categoriaOrigen = cat;
            }
        });

        function googleFormSubmit(e) {
            // Concatenar ruta + mensaje antes de enviar
            const visibleText = document.getElementById("mensajeAreaVisible").value;
            const hiddenInput = document.getElementById("mensajeAreaOculto");
            
            if (rutaTrazabilidad) {
                hiddenInput.value = rutaTrazabilidad + "\n\n" + visibleText;
            } else {
                hiddenInput.value = visibleText;
            }

            const btn = document.getElementById("submitBtn");
            const msg = document.getElementById("formMsg");
            if (btn) {
                btn.textContent = "Enviado";
                btn.disabled = true;
            }
            if (msg) msg.textContent = "Recibido. Te contactamos pronto.";
            
            setTimeout(() => {
                if (e && e.target) e.target.reset();
            }, 200);

            setTimeout(() => {
                if (btn) {
                    btn.textContent = "Enviar";
                    btn.disabled = false;
                }
                if (msg) msg.textContent = "";
            }, 8000);

            // Redirigir al inicio o a la categoría de origen después de 5 segundos
            setTimeout(() => {
                if (categoriaOrigen) {
                    window.location.href = `index.html?cat=${encodeURIComponent(categoriaOrigen)}`;
                } else {
                    window.location.href = "index.html";
                }
            }, 5000);

            return true;
        }
    </script>
</body>
</html>
